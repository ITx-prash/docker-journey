name: e-commerce

services: #ig each items inside the service is a container
  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: "1234"
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  #somewhat similar to: docker run -it --name postgres -e POSTGRES_PASSWORD: "1234" postgres:16

  redis:
    image: redis:7-alpine
    depends_on:
      - db
    container_name: redis
    ports:
      - "6379:6379"
